<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Website</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f2;
        --text: #232323;
        --muted: #666a73;
        --accent: #2f6f73;
        --border: #deded5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
        color: var(--text);
        background: var(--bg);
      }

      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: 64px 0;
      }

      header {
        padding-bottom: 40px;
        border-bottom: 1px solid var(--border);
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2.25rem, 7vw, 4.5rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
      }

      .lead {
        max-width: 680px;
        color: var(--muted);
        font-size: 1.15rem;
      }

      section {
        padding: 40px 0 0;
      }

      h2 {
        margin: 0 0 12px;
        font-size: 1.25rem;
      }

      a {
        color: var(--accent);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.2em;
      }

      footer {
        margin-top: 56px;
        padding-top: 24px;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>My Website</h1>
        <p class="lead">
          GitHub Pagesで公開するシンプルな個人サイトです。プロフィール、制作物、連絡先などをここにまとめられます。
        </p>
      </header>

      <section aria-labelledby="about-title">
        <h2 id="about-title">About</h2>
        <p>
          ここに自己紹介を書きます。興味のある分野、取り組んでいること、公開したい情報に合わせて編集してください。
        </p>
      </section>

      <section aria-labelledby="works-title">
        <h2 id="works-title">Works</h2>
        <p>
          制作物やプロジェクトへのリンクを掲載できます。
        </p>
      </section>

      <section aria-labelledby="contact-title">
        <h2 id="contact-title">Contact</h2>
        <p>
          連絡先やSNSへのリンクを追加してください。
        </p>
      </section>

      <footer>
        <p>&copy; 2026 My Website</p>
      </footer>
    </main>
  </body>
</html>
